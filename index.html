<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Secret Date Nepal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            position: relative;
            min-height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #000;
        }

        /* BACKGROUND VIDEO STYLES */
        #bg-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: 1;
            transform: translate(-50%, -50%);
            object-fit: cover;
            filter: brightness(0.4) contrast(1.1); /* Darkens video so text is clear */
        }

        /* OVERLAY GRADIENT */
        .video-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(9,10,16,0.3) 0%, rgba(9,10,16,0.85) 100%);
            z-index: 2;
        }

        /* LOGIN GLASS CARD */
        .login-card {
            position: relative;
            z-index: 3;
            background: rgba(20, 21, 31, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 51, 102, 0.35);
            padding: 40px 30px;
            border-radius: 28px;
            width: 440px;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 30px rgba(255, 51, 102, 0.2);
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 6px;
            background: linear-gradient(45deg, #ff3366, #00e5ff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .dev-badge {
            background: rgba(245, 158, 11, 0.15);
            border: 1px solid rgba(245, 158, 11, 0.6);
            color: #f59e0b;
            font-size: 0.78rem;
            padding: 6px 14px;
            border-radius: 20px;
            margin: 18px 0 25px 0;
            display: inline-block;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .direct-btn {
            width: 100%;
            background: linear-gradient(45deg, #ff3366, #a855f7);
            border: none;
            color: white;
            padding: 15px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 20px rgba(255, 51, 102, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .direct-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(255, 51, 102, 0.6);
        }

        .subtitle {
            font-size: 0.85rem;
            color: #d1d5db;
            margin-bottom: 10px;
        }

        .footer-note {
            font-size: 0.75rem;
            color: #aaa;
            margin-top: 22px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <!-- BACKGROUND VIDEO -->
    <video autoplay loop muted playsinline id="bg-video">
        <source src="bg-video.mp4" type="video/mp4">
        Your browser does not support HTML5 video.
    </video>

    <!-- DARK OVERLAY -->
    <div class="video-overlay"></div>

    <!-- MAIN LOGIN CARD -->
    <div class="login-card">
        <div class="login-title">Secret Date Nepal 💖</div>
        <p class="subtitle">Private Romantic World for Nepal</p>

        <div class="dev-badge">🛠️ Development Mode (Fast Access)</div>

        <button class="direct-btn" onclick="window.location.href='dashboard.html'">
            <i class="fa-solid fa-rocket"></i> Enter Dashboard Directly 🚀
        </button>

        <p class="footer-note">
            🎥 Video Background Active<br>
            Face Verification is temporarily bypassed while building features.
        </p>
    </div>

</body>
</html>

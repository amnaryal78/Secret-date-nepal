<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Secret Date Nepal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif;
            background: #090a10; color: #fff; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        .login-card {
            background: rgba(20, 21, 31, 0.9); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 51, 102, 0.3); padding: 30px;
            border-radius: 24px; width: 420px; max-width: 90%; text-align: center;
            box-shadow: 0 15px 40px rgba(255, 51, 102, 0.25);
        }
        .login-card h2 {
            font-size: 1.6rem; margin-bottom: 8px;
            background: linear-gradient(45deg, #ff3366, #a855f7);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .video-box {
            position: relative; width: 100%; height: 260px; background: #000;
            border-radius: 16px; overflow: hidden; margin: 15px 0; border: 2px solid #ff3366;
        }
        video#webcam { width: 100%; height: 100%; object-fit: cover; }
        .input-box {
            width: 100%; padding: 12px 16px; margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px; color: #fff; outline: none; font-size: 0.9rem;
        }
        .face-btn {
            width: 100%; background: linear-gradient(45deg, #ff3366, #ff0055);
            border: none; color: white; padding: 12px; border-radius: 12px;
            font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255, 51, 102, 0.4);
        }
        .face-btn:hover { transform: translateY(-2px); }
        .status-msg { font-size: 0.85rem; color: #ff3366; margin-top: 10px; min-height: 20px; }
        .signup-link { font-size: 0.85rem; color: #aaa; margin-top: 15px; display: block; text-decoration: none; }
        .signup-link span { color: #ff3366; font-weight: bold; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Secret Date Nepal 🤫</h2>
        <p style="font-size: 0.8rem; color: #ccc;">Biometric Face Login (Your Face is Your Password)</p>

        <input type="text" id="user-identifier" class="input-box" placeholder="Enter SDNP ID or Email">

        <div class="video-box">
            <video id="webcam" autoplay playsinline muted></video>
        </div>

        <p class="status-msg" id="status-text">Starting Camera for Face Scan...</p>

        <button class="face-btn" id="face-login-btn">Scan Face to Login 👤</button>

        <a href="signup.html" class="signup-link">Don't have an account? <span>Register Face Here</span></a>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import * as faceapi from 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.esm.js';

        const webcam = document.getElementById('webcam');
        const statusText = document.getElementById('status-text');
        const loginBtn = document.getElementById('face-login-btn');

        async function initCamera() {
            try {
                statusText.innerText = "Loading AI Models...";
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/model/';
                await Promise.all([
                    faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);

                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                webcam.srcObject = stream;
                statusText.innerText = "Look into camera & click Scan Face!";
            } catch(err) {
                statusText.innerText = "Camera Permission Error!";
            }
        }

        initCamera();

        loginBtn.addEventListener('click', async () => {
            const idInput = document.getElementById('user-identifier').value.trim();
            if(!idInput) return alert("Please enter your SDNP ID or Registered Email first!");

            loginBtn.disabled = true;
            loginBtn.innerText = "Verifying Face...";
            statusText.innerText = "Scanning facial biometrics...";

            try {
                // 1. Detect current face from camera
                const detection = await faceapi.detectSingleFace(webcam).withFaceLandmarks().withFaceDescriptor();

                if(!detection) {
                    alert("No face detected! Look directly into camera.");
                    loginBtn.disabled = false;
                    loginBtn.innerText = "Scan Face to Login 👤";
                    return;
                }

                // 2. Search Database for user profile
                statusText.innerText = "Matching Face with Database...";
                const q = query(collection(db, "users"), where("sdnpId", "==", idInput));
                let snapshot = await getDocs(q);

                if(snapshot.empty) {
                    const q2 = query(collection(db, "users"), where("email", "==", idInput));
                    snapshot = await getDocs(q2);
                }

                if(snapshot.empty) {
                    alert("No account found with this SDNP ID / Email!");
                    loginBtn.disabled = false;
                    loginBtn.innerText = "Scan Face to Login 👤";
                    return;
                }

                let isFaceMatched = false;
                let userData = null;

                snapshot.forEach((docSnap) => {
                    const u = docSnap.data();
                    if(u.faceDescriptor) {
                        const existingArr = Object.values(u.faceDescriptor);
                        if(existingArr.length === 128) {
                            const dbDescriptor = new Float32Array(existingArr);
                            const distance = faceapi.euclideanDistance(detection.descriptor, dbDescriptor);
                            console.log("Face Login Distance:", distance);

                            // Strict threshold (0.38)
                            if(distance <= 0.38) {
                                isFaceMatched = true;
                                userData = u;
                            }
                        }
                    }
                });

                if(isFaceMatched) {
                    alert("✅ Face Verified Successfully! Welcome back to Secret Date Nepal.");
                    window.location.href = 'dashboard.html';
                } else {
                    alert("⛔ LOGIN FAILED!\n\nWrong Face Detected! Your face does not match the registered owner of this account.");
                    statusText.innerText = "Access Denied: Wrong Face!";
                    loginBtn.disabled = false;
                    loginBtn.innerText = "Scan Face to Login 👤";
                }

            } catch(err) {
                alert("Error: " + err.message);
                loginBtn.disabled = false;
                loginBtn.innerText = "Scan Face to Login 👤";
            }
        });
    </script>
</body>
</html>

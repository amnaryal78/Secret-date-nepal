<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Secret Date Nepal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            background: #090a10;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 51, 102, 0.18), transparent 45%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.18), transparent 45%);
            color: #fff; min-height: 100vh;
            display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .login-card {
            background: rgba(20, 21, 31, 0.9); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 51, 102, 0.35); padding: 35px 25px;
            border-radius: 24px; width: 420px; max-width: 100%; text-align: center;
            box-shadow: 0 15px 40px rgba(255, 51, 102, 0.25);
        }
        .login-title {
            font-size: 1.6rem; font-weight: 800; margin-bottom: 8px;
            background: linear-gradient(45deg, #ff3366, #00e5ff, #a855f7);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .dev-badge {
            background: rgba(245, 158, 11, 0.2); border: 1px solid #f59e0b; color: #f59e0b;
            font-size: 0.78rem; padding: 6px 12px; border-radius: 20px; margin: 15px 0 25px 0;
            display: inline-block; font-weight: 600;
        }
        .direct-btn {
            width: 100%; background: linear-gradient(45deg, #ff3366, #a855f7);
            border: none; color: white; padding: 14px; border-radius: 14px;
            font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255, 51, 102, 0.4);
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .direct-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 51, 102, 0.6); }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-title">Secret Date Nepal 💖</div>
        <p style="font-size: 0.85rem; color: #ccc;">Private Romantic Platform</p>

        <div class="dev-badge">🛠️ Testing Mode Enabled</div>

        <button class="direct-btn" onclick="window.location.href='dashboard.html'">
            <i class="fa-solid fa-rocket"></i> Enter Dashboard Directly 🚀
        </button>
        
        <p style="font-size: 0.75rem; color: #aaa; margin-top: 20px;">
            Face Security is temporarily disabled while designing UI & Sidebar features.
        </p>
    </div>

</body>
</html>

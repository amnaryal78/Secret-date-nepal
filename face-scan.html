<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Verification - Secret Date Nepal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Face API JS Reliable CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.js"></script>

    <style>
        .scan-card {
            background: rgba(18, 18, 24, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 25px;
            border-radius: 20px;
            width: 400px;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            position: relative;
            z-index: 10;
        }

        .video-box {
            position: relative;
            width: 100%;
            height: 280px;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            margin: 15px 0;
            border: 2px solid #ff3366;
        }

        video#webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .status-text {
            font-size: 0.9rem;
            color: #ff3366;
            margin-top: 10px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <video autoplay muted loop id="bg-video">
        <source src="bg-video.mp4" type="video/mp4">
    </video>

    <div class="scan-card">
        <h2>Face Verification 👤</h2>
        <p style="font-size: 0.85rem; color: #ccc;">One Person = One Account strictly enforced!</p>

        <div class="video-box">
            <video id="webcam" autoplay playsinline muted></video>
        </div>

        <p class="status-text" id="status">Loading AI Models... Please wait.</p>

        <button id="scan-btn" disabled style="opacity: 0.6;">Scan Face & Verify</button>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const webcam = document.getElementById('webcam');
        const statusText = document.getElementById('status');
        const scanBtn = document.getElementById('scan-btn');

        let currentUser = null;

        // Check Auth Status
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists() && userDoc.data().faceVerified) {
                    window.location.href = 'profile-setup.html';
                } else {
                    initFaceAPI();
                }
            } else {
                window.location.href = 'index.html';
            }
        });

        // Initialize Face-API Models & Camera
        async function initFaceAPI() {
            try {
                // Ensure faceapi is available globally
                const faceapiObj = window.faceapi;
                if (!faceapiObj || !faceapiObj.nets) {
                    throw new Error("Face-API Library loading delay. Retrying...");
                }

                // jsDelivr CDN Models Path
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/model';
                
                await Promise.all([
                    faceapiObj.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
                    faceapiObj.nets.faceLandmark64Net.loadFromUri(MODEL_URL),
                    faceapiObj.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);

                statusText.innerText = "Starting Camera...";
                startCamera();
            } catch (err) {
                console.error(err);
                statusText.innerText = "Error loading AI models: " + err.message;
                // Retry if library was loading slowly
                setTimeout(initFaceAPI, 1500);
            }
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => {
                    webcam.srcObject = stream;
                    statusText.innerText = "Align your face clearly & click Scan!";
                    scanBtn.disabled = false;
                    scanBtn.style.opacity = "1";
                })
                .catch(err => {
                    statusText.innerText = "Camera access denied: " + err.message;
                });
        }

        // Compare Face Descriptor with Existing Database Users
        async function checkDuplicateFace(newDescriptor) {
            statusText.innerText = "Checking database for duplicate faces...";
            const querySnapshot = await getDocs(collection(db, "users"));
            let isDuplicate = false;

            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                if (data.faceDescriptor && docSnap.id !== currentUser.uid) {
                    const existingDescriptor = new Float32Array(data.faceDescriptor);
                    const distance = window.faceapi.euclideanDistance(newDescriptor, existingDescriptor);
                    if (distance <= 0.45) {
                        isDuplicate = true;
                    }
                }
            });

            return isDuplicate;
        }

        // Scan Face Trigger
        scanBtn.addEventListener('click', async () => {
            scanBtn.disabled = true;
            scanBtn.innerText = "Scanning...";
            statusText.innerText = "Detecting face landmarks...";

            try {
                const faceapiObj = window.faceapi;
                const detection = await faceapiObj.detectSingleFace(webcam)
                    .withFaceLandmarks()
                    .withFaceDescriptor();

                if (!detection) {
                    alert("No face detected! Please sit in good light and face the camera directly.");
                    statusText.innerText = "Scan failed. Try again!";
                    scanBtn.disabled = false;
                    scanBtn.innerText = "Scan Face & Verify";
                    return;
                }

                const faceDescriptorArray = Array.from(detection.descriptor);

                // Strict One Person = One ID Check
                const duplicateFound = await checkDuplicateFace(detection.descriptor);

                if (duplicateFound) {
                    alert("⛔ REJECTED: An account with this face ALREADY EXISTS in Secret Date Nepal!\n\nMultiple accounts are NOT allowed. Please login with your original account.");
                    statusText.innerText = "Duplicate Account Detected! Blocked.";
                    scanBtn.innerText = "Account Blocked";
                    return;
                }

                // Save Face Descriptor & Mark Verified
                await setDoc(doc(db, "users", currentUser.uid), {
                    faceVerified: true,
                    faceDescriptor: faceDescriptorArray,
                    updatedAt: new Date()
                }, { merge: true });

                alert("Face Verification Successful! 🎉");
                window.location.href = 'profile-setup.html';
            } catch (err) {
                alert("Scan Error: " + err.message);
                scanBtn.disabled = false;
                scanBtn.innerText = "Scan Face & Verify";
            }
        });
    </script>
</body>
</html>

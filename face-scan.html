<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Verification - Secret Date Nepal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        .scan-card {
            background: rgba(18, 18, 24, 0.85); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.12); padding: 25px;
            border-radius: 20px; width: 400px; max-width: 90%; text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7); position: relative; z-index: 10;
        }
        .video-box {
            position: relative; width: 100%; height: 280px; background: #000;
            border-radius: 15px; overflow: hidden; margin: 15px 0; border: 2px solid #ff3366;
        }
        video#webcam { width: 100%; height: 100%; object-fit: cover; }
        .status-text { font-size: 0.9rem; color: #ff3366; margin-top: 10px; font-weight: 500; }
    </style>
</head>
<body>

    <video autoplay muted loop id="bg-video">
        <source src="bg-video.mp4" type="video/mp4">
    </video>

    <div class="scan-card">
        <h2>Face Verification 👤</h2>
        <p style="font-size: 0.85rem; color: #ccc;">One Person = One Account strictly enforced!</p>

        <div class="video-box">
            <video id="webcam" autoplay playsinline muted></video>
        </div>

        <p class="status-text" id="status">Loading AI Biometrics... Please wait.</p>
        <button id="scan-btn" disabled style="opacity: 0.6; background:#ff3366; color:#fff; padding:10px 20px; border:none; border-radius:10px; cursor:pointer;">Scan Face & Verify</button>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        // DIRECT ESM IMPORT OF FACE-API (NO UNDEFINED ERRORS!)
        import * as faceapi from 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.esm.js';

        const webcam = document.getElementById('webcam');
        const statusText = document.getElementById('status');
        const scanBtn = document.getElementById('scan-btn');

        let currentUser = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists() && userDoc.data().faceVerified) {
                    window.location.href = 'profile-setup.html';
                } else {
                    initFaceAPI();
                }
            } else {
                window.location.href = 'index.html';
            }
        });

        async function initFaceAPI() {
            try {
                statusText.innerText = "Downloading AI Recognition Models...";
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/model/';
                
                await Promise.all([
                    faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);

                statusText.innerText = "Models Loaded! Starting Camera...";
                startCamera();
            } catch (err) {
                statusText.innerText = "Error: " + err.message;
            }
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => {
                    webcam.srcObject = stream;
                    statusText.innerText = "Look directly at the camera & Click Scan!";
                    scanBtn.disabled = false;
                    scanBtn.style.opacity = "1";
                })
                .catch(err => {
                    statusText.innerText = "Camera access denied.";
                });
        }

        // BIOMETRIC DUPLICATE CHECK
        async function checkDuplicateFace(newDescriptor) {
            statusText.innerText = "Checking entire database for your face...";
            const querySnapshot = await getDocs(collection(db, "users"));
            let isDuplicate = false;

            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                // Compare with valid existing descriptors
                if (data.faceDescriptor && docSnap.id !== currentUser.uid && Array.isArray(data.faceDescriptor) && data.faceDescriptor.length === 128) {
                    const existingDescriptor = new Float32Array(data.faceDescriptor);
                    const distance = faceapi.euclideanDistance(newDescriptor, existingDescriptor);
                    
                    // The distance threshold for same person (Lower is stricter)
                    if (distance <= 0.45) {
                        isDuplicate = true;
                    }
                }
            });
            return isDuplicate;
        }

        scanBtn.addEventListener('click', async () => {
            scanBtn.disabled = true;
            scanBtn.innerText = "Scanning Biometrics...";
            statusText.innerText = "Extracting facial features...";

            try {
                const detection = await faceapi.detectSingleFace(webcam)
                    .withFaceLandmarks()
                    .withFaceDescriptor();

                if (!detection) {
                    alert("No face detected! Please ensure good lighting and look straight.");
                    statusText.innerText = "Scan failed. Try again!";
                    scanBtn.disabled = false;
                    scanBtn.innerText = "Scan Face & Verify";
                    return;
                }

                // Strict Identity Check
                const duplicateFound = await checkDuplicateFace(detection.descriptor);

                if (duplicateFound) {
                    alert("⛔ SECURITY ALERT: An account with your exact face ALREADY EXISTS in the system!\n\nCreating duplicate accounts is strictly blocked. Please login to your original account.");
                    statusText.innerText = "Duplicate Blocked!";
                    scanBtn.innerText = "Blocked";
                    return;
                }

                // Save Identity Descriptor Array
                const faceDescriptorArray = Array.from(detection.descriptor);
                await setDoc(doc(db, "users", currentUser.uid), {
                    faceVerified: true,
                    faceDescriptor: faceDescriptorArray,
                    updatedAt: new Date()
                }, { merge: true });

                alert("Face Verified! Identity secured. 🎉");
                window.location.href = 'profile-setup.html';
            } catch (err) {
                alert("Scan Error: " + err.message);
                scanBtn.disabled = false;
                scanBtn.innerText = "Scan Face & Verify";
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Verification - Secret Date Nepal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js" crossorigin="anonymous"></script>

    <style>
        .scan-card {
            background: rgba(18, 18, 24, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 25px;
            border-radius: 20px;
            width: 400px;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            position: relative;
            z-index: 10;
        }

        .video-box {
            position: relative;
            width: 100%;
            height: 280px;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            margin: 15px 0;
            border: 2px solid #ff3366;
        }

        video#webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .status-text {
            font-size: 0.9rem;
            color: #ff3366;
            margin-top: 10px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <video autoplay muted loop id="bg-video">
        <source src="bg-video.mp4" type="video/mp4">
    </video>

    <div class="scan-card">
        <h2>Face Verification 👤</h2>
        <p style="font-size: 0.85rem; color: #ccc;">One Person = One Account strictly enforced!</p>

        <div class="video-box">
            <video id="webcam" autoplay playsinline muted></video>
        </div>

        <p class="status-text" id="status">Loading Google AI Model... Please wait.</p>

        <button id="scan-btn" disabled style="opacity: 0.6;">Scan Face & Verify</button>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const webcam = document.getElementById('webcam');
        const statusText = document.getElementById('status');
        const scanBtn = document.getElementById('scan-btn');

        let currentUser = null;
        let faceLandmarker = null;

        // Check Auth Status
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists() && userDoc.data().faceVerified) {
                    window.location.href = 'profile-setup.html';
                } else {
                    initMediaPipe();
                }
            } else {
                window.location.href = 'index.html';
            }
        });

        // Initialize Google MediaPipe Face Landmarker
        async function initMediaPipe() {
            try {
                const vision = await window.FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm"
                );
                
                faceLandmarker = await window.FaceLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                        delegate: "GPU"
                    },
                    runningMode: "IMAGE",
                    numFaces: 1
                });

                statusText.innerText = "Starting Camera...";
                startCamera();
            } catch (err) {
                console.error(err);
                statusText.innerText = "Error loading Google AI: " + err.message;
            }
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => {
                    webcam.srcObject = stream;
                    statusText.innerText = "Align your face clearly & click Scan!";
                    scanBtn.disabled = false;
                    scanBtn.style.opacity = "1";
                })
                .catch(err => {
                    statusText.innerText = "Camera access denied: " + err.message;
                });
        }

        // Normalize & compare biometric landmarks (distance calculation)
        function calculateDistance(pointsA, pointsB) {
            let sum = 0;
            const count = Math.min(pointsA.length, pointsB.length);
            for (let i = 0; i < count; i++) {
                const dx = pointsA[i].x - pointsB[i].x;
                const dy = pointsA[i].y - pointsB[i].y;
                const dz = (pointsA[i].z || 0) - (pointsB[i].z || 0);
                sum += Math.sqrt(dx * dx + dy * dy + dz * dz);
            }
            return sum / count;
        }

        // Compare face landmarks with existing Database users
        async function checkDuplicateFace(newLandmarks) {
            statusText.innerText = "Checking biometric database for duplicates...";
            const querySnapshot = await getDocs(collection(db, "users"));
            let isDuplicate = false;

            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                if (data.faceLandmarks && docSnap.id !== currentUser.uid) {
                    const distance = calculateDistance(newLandmarks, data.faceLandmarks);
                    // Threshold check for facial structure similarity
                    if (distance <= 0.08) {
                        isDuplicate = true;
                    }
                }
            });

            return isDuplicate;
        }

        // Scan Face Trigger
        scanBtn.addEventListener('click', async () => {
            if (!faceLandmarker) return;

            scanBtn.disabled = true;
            scanBtn.innerText = "Scanning...";
            statusText.innerText = "Analyzing facial structure...";

            try {
                const result = faceLandmarker.detect(webcam);

                if (!result.faceLandmarks || result.faceLandmarks.length === 0) {
                    alert("No face detected! Please position your face clearly in the camera.");
                    statusText.innerText = "Scan failed. Try again!";
                    scanBtn.disabled = false;
                    scanBtn.innerText = "Scan Face & Verify";
                    return;
                }

                const currentLandmarks = result.faceLandmarks[0];

                // Strict One Person = One ID Check
                const duplicateFound = await checkDuplicateFace(currentLandmarks);

                if (duplicateFound) {
                    alert("⛔ REJECTED: An account with this face ALREADY EXISTS in Secret Date Nepal!\n\nMultiple accounts are NOT allowed. Please login with your original account.");
                    statusText.innerText = "Duplicate Account Detected! Blocked.";
                    scanBtn.innerText = "Account Blocked";
                    return;
                }

                // Clean & save simplified landmarks array to Firestore
                const simplifiedLandmarks = currentLandmarks.map(pt => ({
                    x: Number(pt.x.toFixed(4)),
                    y: Number(pt.y.toFixed(4)),
                    z: Number((pt.z || 0).toFixed(4))
                }));

                await setDoc(doc(db, "users", currentUser.uid), {
                    faceVerified: true,
                    faceLandmarks: simplifiedLandmarks,
                    updatedAt: new Date()
                }, { merge: true });

                alert("Face Verification Successful! 🎉");
                window.location.href = 'profile-setup.html';
            } catch (err) {
                alert("Scan Error: " + err.message);
                scanBtn.disabled = false;
                scanBtn.innerText = "Scan Face & Verify";
            }
        });
    </script>
</body>
</html>

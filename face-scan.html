<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Verification - Secret Date Nepal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        .scan-card {
            background: rgba(18, 18, 24, 0.9); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 51, 102, 0.3); padding: 25px;
            border-radius: 20px; width: 400px; max-width: 90%; text-align: center;
            box-shadow: 0 15px 35px rgba(255, 51, 102, 0.2); position: relative; z-index: 10; margin: 40px auto;
        }
        .video-box {
            position: relative; width: 100%; height: 280px; background: #000;
            border-radius: 15px; overflow: hidden; margin: 15px 0; border: 2px solid #ff3366;
        }
        video#webcam { width: 100%; height: 100%; object-fit: cover; }
        .status-text { font-size: 0.88rem; color: #ff3366; margin-top: 10px; font-weight: 500; }
    </style>
</head>
<body>

    <div class="scan-card">
        <h2>Face Verification 👤</h2>
        <p style="font-size: 0.8rem; color: #ccc;">Strict Identity Lock (1 Person = 1 Account Only)</p>

        <div class="video-box">
            <video id="webcam" autoplay playsinline muted></video>
        </div>

        <p class="status-text" id="status">Loading AI Biometrics... Please wait.</p>
        <button id="scan-btn" disabled style="opacity: 0.5; background:#ff3366; color:#fff; padding:12px 24px; border:none; border-radius:12px; cursor:pointer; font-weight:bold; width:100%; margin-top:10px;">Scan & Verify Face 🚀</button>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import * as faceapi from 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.esm.js';

        const webcam = document.getElementById('webcam');
        const statusText = document.getElementById('status');
        const scanBtn = document.getElementById('scan-btn');

        let currentUser = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists() && userDoc.data().faceVerified) {
                    window.location.href = 'profile-setup.html';
                } else {
                    initFaceAPI();
                }
            } else {
                window.location.href = 'index.html';
            }
        });

        async function initFaceAPI() {
            try {
                statusText.innerText = "Loading AI Models...";
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/model/';
                await Promise.all([
                    faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);
                statusText.innerText = "Look straight at the camera and click Scan!";
                startCamera();
            } catch (err) { statusText.innerText = "AI Error: " + err.message; }
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => {
                    webcam.srcObject = stream;
                    scanBtn.disabled = false;
                    scanBtn.style.opacity = "1";
                })
                .catch(err => { statusText.innerText = "Camera Permission Denied!"; });
        }

        async function checkDuplicateFace(newDescriptor) {
            statusText.innerText = "Checking Database for Face Match...";
            const querySnapshot = await getDocs(collection(db, "users"));
            let isDuplicate = false;

            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                if (data.faceDescriptor && docSnap.id !== currentUser.uid) {
                    let existingArr = Object.values(data.faceDescriptor);
                    if (existingArr.length === 128) {
                        const existingDescriptor = new Float32Array(existingArr);
                        const distance = faceapi.euclideanDistance(newDescriptor, existingDescriptor);
                        console.log("Face Match Distance:", distance);
                        
                        // Strict threshold (0.40)
                        if (distance <= 0.40) {
                            isDuplicate = true;
                        }
                    }
                }
            });
            return isDuplicate;
        }

        scanBtn.addEventListener('click', async () => {
            scanBtn.disabled = true;
            scanBtn.innerText = "Scanning Biometrics...";

            try {
                const detection = await faceapi.detectSingleFace(webcam).withFaceLandmarks().withFaceDescriptor();

                if (!detection) {
                    alert("No face detected! Look directly into camera.");
                    scanBtn.disabled = false;
                    scanBtn.innerText = "Scan & Verify Face 🚀";
                    return;
                }

                const duplicateFound = await checkDuplicateFace(detection.descriptor);

                if (duplicateFound) {
                    alert("⛔ SECURITY BLOCK: Account with your face ALREADY EXISTS!\nMultiple IDs per person are forbidden.");
                    statusText.innerText = "Duplicate Account Blocked!";
                    scanBtn.innerText = "Permanently Blocked";
                    return;
                }

                const faceArray = Array.from(detection.descriptor);
                await setDoc(doc(db, "users", currentUser.uid), {
                    faceVerified: true,
                    faceDescriptor: faceArray,
                    updatedAt: new Date()
                }, { merge: true });

                alert("Face Verified Successfully! 🎉");
                window.location.href = 'profile-setup.html';
            } catch (err) {
                alert("Error: " + err.message);
                scanBtn.disabled = false;
                scanBtn.innerText = "Scan & Verify Face 🚀";
            }
        });
    </script>
</body>
</html>

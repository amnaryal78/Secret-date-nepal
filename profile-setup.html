<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Profile - Secret Date Nepal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { overflow-y: auto; padding: 40px 0; }
        .setup-card {
            background: rgba(18, 18, 24, 0.88);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 30px;
            border-radius: 20px;
            width: 450px;
            max-width: 90%;
            margin: auto;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            position: relative;
            z-index: 10;
        }

        .input-group { text-align: left; margin-bottom: 12px; }
        .input-group label { font-size: 0.85rem; color: #ff3366; font-weight: 500; display: block; margin-bottom: 4px; }
        
        select {
            width: 100%;
            padding: 12px 15px;
            margin: 5px 0;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
        }
        select option { background: #121212; color: #fff; }
    </style>
</head>
<body>

    <video autoplay muted loop id="bg-video">
        <source src="bg-video.mp4" type="video/mp4">
    </video>

    <div class="setup-card">
        <h2>Setup Your Profile 💖</h2>
        <p style="font-size: 0.85rem; color: #ccc; margin-bottom: 20px;">Complete your profile to find your secret match</p>

        <form id="profile-form">
            
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="full-name" placeholder="John Doe" required>
            </div>

            <div class="input-group">
                <label>Custom SDNP Username (Example: SDNP-Aman)</label>
                <input type="text" id="sdnp-id" placeholder="SDNP-YourName" required>
            </div>

            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex:1;">
                    <label>Age</label>
                    <input type="number" id="age" min="18" max="99" placeholder="22" required>
                </div>
                <div class="input-group" style="flex:1;">
                    <label>Gender</label>
                    <select id="gender" required>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label>Looking For</label>
                <select id="looking-for" required>
                    <option value="Female">Looking for Female 👩</option>
                    <option value="Male">Looking for Male 👨</option>
                    <option value="Any">Open to All 🌈</option>
                </select>
            </div>

            <div class="input-group">
                <label>Country</label>
                <select id="country" required>
                    <option value="Nepal">Nepal 🇳🇵</option>
                    <option value="India">India 🇮🇳</option>
                    <option value="United States">United States 🇺🇸</option>
                    <option value="United Kingdom">United Kingdom 🇬🇧</option>
                    <option value="Australia">Australia 🇦🇺</option>
                    <option value="Canada">Canada 🇨🇦</option>
                    <option value="United Arab Emirates">United Arab Emirates 🇦🇪</option>
                    <option value="Qatar">Qatar 🇶🇦</option>
                    <option value="Saudi Arabia">Saudi Arabia 🇸🇦</option>
                    <option value="Japan">Japan 🇯🇵</option>
                    <option value="South Korea">South Korea 🇰🇷</option>
                    <option value="Malaysia">Malaysia 🇲🇾</option>

                </select>
            </div>

            <div class="input-group">
                <label>City / Location</label>
                <input type="text" id="city" placeholder="Kathmandu / Pokhara / etc." required>
            </div>

            <div class="input-group">
                <label>Bio (Short Introduction)</label>
                <input type="text" id="bio" placeholder="Passionate traveler & music lover..." required>
            </div>

            <div class="input-group">
                <label>Profile Picture URL (Direct Image Link)</label>
                <input type="url" id="photo-url" placeholder="https://images.unsplash.com/photo-..." required>
            </div>

            <div class="input-group">
                <label>Cover Picture URL (Optional)</label>
                <input type="url" id="cover-url" placeholder="https://images.unsplash.com/cover-...">
            </div>

            <button type="submit" id="save-btn">Save & Go to Dashboard 🚀</button>
        </form>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let currentUser = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists() && userDoc.data().profileCompleted) {
                    window.location.href = 'dashboard.html';
                }
            } else {
                window.location.href = 'index.html';
            }
        });

        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.innerText = "Saving Profile...";

            let sdnpInput = document.getElementById('sdnp-id').value.trim();
            if(!sdnpInput.toUpperCase().startsWith("SDNP-")){
                sdnpInput = "SDNP-" + sdnpInput;
            }

            try {
                await setDoc(doc(db, "users", currentUser.uid), {
                    fullName: document.getElementById('full-name').value.trim(),
                    sdnpId: sdnpInput,
                    age: parseInt(document.getElementById('age').value),
                    gender: document.getElementById('gender').value,
                    lookingFor: document.getElementById('looking-for').value,
                    country: document.getElementById('country').value,
                    city: document.getElementById('city').value.trim(),
                    bio: document.getElementById('bio').value.trim(),
                    photoUrl: document.getElementById('photo-url').value.trim(),
                    coverUrl: document.getElementById('cover-url').value.trim() || 'https://images.unsplash.com/photo-1518709268805-4e9042af9f23',
                    profileCompleted: true,
                    invisibleMode: false,
                    updatedAt: new Date()
                }, { merge: true });

                alert("Profile Saved Successfully! 🎉");
                window.location.href = 'dashboard.html';
            } catch (error) {
                alert("Error saving profile: " + error.message);
                btn.disabled = false;
                btn.innerText = "Save & Go to Dashboard 🚀";
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Secret Date Nepal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0b0c10; color: #ffffff; min-height: 100vh; padding-bottom: 80px; }

        /* Top Bar Navigation */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(18, 18, 24, 0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 25px; sticky: top; top: 0; z-index: 100;
        }
        .navbar h2 { color: #ff3366; font-size: 1.4rem; font-weight: 700; }
        .nav-links { display: flex; gap: 15px; }
        .nav-btn {
            background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 0.85rem;
            cursor: pointer; transition: 0.3s;
        }
        .nav-btn.active, .nav-btn:hover { background: #ff3366; border-color: #ff3366; }

        /* AD SPACE BANNER TOP */
        .ad-banner-top {
            background: rgba(255, 255, 255, 0.03); border: 1px dashed rgba(255, 255, 255, 0.2);
            margin: 15px auto; max-width: 800px; text-align: center; padding: 15px;
            color: #777; font-size: 0.8rem; border-radius: 12px;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 0 15px; }
        .tab-content { display: none; margin-top: 20px; }
        .tab-content.active { display: block; }

        /* SEARCH BAR */
        .search-box {
            display: flex; gap: 10px; margin-bottom: 20px;
        }
        .search-box input {
            flex: 1; padding: 12px 15px; background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 12px; color: #fff; outline: none;
        }
        .search-box button {
            background: #ff3366; border: none; color: white; padding: 0 20px; border-radius: 12px; font-weight: 600; cursor: pointer;
        }

        /* GRID CARDS */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card {
            background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px; padding: 20px; text-align: center; position: relative; transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); border-color: #ff3366; }
        .card img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #ff3366; margin-bottom: 10px; }
        .card h4 { font-size: 1.1rem; }
        .card-id { font-size: 0.75rem; color: #ff3366; font-weight: 600; margin-bottom: 5px; }
        .msg-btn {
            width: 100%; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; padding: 8px; border-radius: 12px; font-weight: 500; cursor: pointer; margin-top: 10px; position: relative;
        }
        .msg-btn:hover { background: #ff3366; }

        /* UNREAD BADGE */
        .unread-badge {
            position: absolute; top: -5px; right: -5px; background: #ff0055; color: white;
            font-size: 0.75rem; font-weight: 700; width: 20px; height: 20px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 0 10px rgba(255,0,85,0.8);
        }

        /* FEED SECTION */
        .create-post {
            background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px; border-radius: 16px; margin-bottom: 25px;
        }
        .create-post input, .create-post textarea {
            width: 100%; padding: 10px; margin-bottom: 10px; background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 10px; color: #fff; outline: none;
        }
        .create-post button {
            background: #ff3366; border: none; color: white; padding: 8px 20px; border-radius: 10px; font-weight: 600; cursor: pointer;
        }

        .post-card {
            background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px; padding: 20px; margin-bottom: 20px;
        }
        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .post-header img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        .post-content img { width: 100%; max-height: 400px; object-fit: cover; border-radius: 12px; margin: 12px 0; }
        .post-actions { display: flex; gap: 20px; font-size: 0.9rem; color: #ccc; cursor: pointer; }

        /* RAINBOW CHAT MODAL */
        .chat-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px);
            justify-content: center; align-items: center; z-index: 1000;
        }
        .chat-box {
            background: #121218; border: 2px solid; border-image: linear-gradient(45deg, #ff0055, #7a00ff, #00e5ff) 1;
            width: 420px; max-width: 92%; height: 560px; border-radius: 20px; display: flex; flex-direction: column;
            box-shadow: 0 0 30px rgba(255, 51, 102, 0.3); overflow: hidden;
        }
        .chat-header {
            background: rgba(255, 255, 255, 0.05); padding: 15px; display: flex; justify-content: space-between; align-items: center;
        }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 75%; padding: 10px 15px; border-radius: 16px; font-size: 0.9rem; }
        .message.sent { align-self: flex-end; background: linear-gradient(135deg, #ff3366, #b026ff); color: #fff; }
        .message.received { align-self: flex-start; background: rgba(255, 255, 255, 0.1); color: #fff; }
        .sticker-msg { font-size: 2.2rem; background: none !important; box-shadow: none !important; }

        .sticker-bar { display: flex; gap: 8px; padding: 8px 15px; background: rgba(255,255,255,0.03); overflow-x: auto; }
        .sticker-item { font-size: 1.4rem; cursor: pointer; transition: 0.2s; }
        .sticker-item:hover { transform: scale(1.3); }

        .chat-input-area { display: flex; padding: 12px; background: rgba(255,255,255,0.05); gap: 8px; }
        .chat-input-area input { flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); padding: 10px 15px; border-radius: 20px; color: #fff; outline: none; }
        .chat-input-area button { background: #ff3366; border: none; color: white; padding: 8px 16px; border-radius: 20px; font-weight: 600; cursor: pointer; }

        /* PROFILE TAB */
        .profile-card { background: rgba(255, 255, 255, 0.04); border-radius: 20px; overflow: hidden; text-align: center; padding-bottom: 25px; }
        .cover-img { width: 100%; height: 180px; object-fit: cover; }
        .profile-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid #ff3366; margin-top: -60px; }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <h2>Secret Date Nepal 🤫</h2>
        <div class="nav-links">
            <button class="nav-btn active" onclick="switchTab('feed-tab', this)">🏠 Feed</button>
            <button class="nav-btn" onclick="switchTab('matches-tab', this)">💕 Matches</button>
            <button class="nav-btn" onclick="switchTab('profile-tab', this)">👤 Profile</button>
            <button class="nav-btn" id="logout-btn" style="background:#333;">Logout</button>
        </div>
    </div>

    <!-- TOP AD BANNER PLACEHOLDER -->
    <div class="ad-banner-top">
        📢 <b>Advertisement Space (728x90 Banner)</b>
    </div>

    <div class="container">

        <!-- 1. FEED TAB -->
        <div id="feed-tab" class="tab-content active">
            <div class="create-post">
                <h3>Create New Post 📸</h3>
                <textarea id="post-text" rows="2" placeholder="Share your secret thoughts or romantic vibe..."></textarea>
                <input type="url" id="post-photo" placeholder="Photo/Image URL (optional)">
                <button id="publish-post-btn">Publish Post 🚀</button>
            </div>

            <div id="feed-posts-container">
                <!-- Posts render here -->
            </div>
        </div>

        <!-- 2. MATCHES TAB -->
        <div id="matches-tab" class="tab-content">
            <div class="search-box">
                <input type="text" id="search-id-input" placeholder="Search by SDNP ID (Example: SDNP-Aman)...">
                <button id="search-btn">Search</button>
            </div>

            <div class="grid" id="matches-grid">
                <!-- Matches render here -->
            </div>
        </div>

        <!-- 3. PROFILE TAB -->
        <div id="profile-tab" class="tab-content">
            <div class="profile-card">
                <img id="my-cover" class="cover-img" src="https://images.unsplash.com/photo-1518709268805-4e9042af9f23" alt="Cover">
                <img id="my-photo" class="profile-img" src="https://via.placeholder.com/120" alt="Profile">
                <h3 id="my-name" style="margin-top: 10px;">Loading...</h3>
                <p id="my-sdnp-id" class="card-id">SDNP-ID</p>
                <p id="my-location" style="font-size:0.85rem; color:#ccc;">📍 Nepal</p>
                <p id="my-bio" style="margin: 15px 0; color:#aaa;">"No bio yet."</p>

                <div style="margin-top: 20px;">
                    <label style="cursor: pointer; background: rgba(255,255,255,0.08); padding: 10px 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2);">
                        👁️ Invisible Mode (Hide Online Status): 
                        <input type="checkbox" id="invisible-toggle">
                    </label>
                </div>
            </div>
        </div>

    </div>

    <!-- RAINBOW REALTIME CHAT MODAL -->
    <div id="chat-modal" class="chat-modal">
        <div class="chat-box">
            <div class="chat-header">
                <h4 id="chat-user-name">Chatting...</h4>
                <div>
                    <button id="block-user-btn" style="background:#ff0055; border:none; color:white; padding:4px 10px; border-radius:10px; font-size:0.75rem; cursor:pointer;">Block User</button>
                    <span id="close-chat-btn" style="cursor:pointer; font-size:1.5rem; margin-left:10px;">&times;</span>
                </div>
            </div>

            <div class="chat-messages" id="chat-messages">
                <!-- Messages -->
            </div>

            <!-- NAUGHTY & FUN STICKERS BAR -->
            <div class="sticker-bar">
                <span class="sticker-item" onclick="sendSticker('🔥')">🔥</span>
                <span class="sticker-item" onclick="sendSticker('💋')">💋</span>
                <span class="sticker-item" onclick="sendSticker('😈')">😈</span>
                <span class="sticker-item" onclick="sendSticker('🥂')">🥂</span>
                <span class="sticker-item" onclick="sendSticker('🌶️')">🌶️</span>
                <span class="sticker-item" onclick="sendSticker('🔞')">🔞</span>
                <span class="sticker-item" onclick="sendSticker('🌹')">🌹</span>
                <span class="sticker-item" onclick="sendSticker('🙈')">🙈</span>
            </div>

            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Type secret message...">
                <button id="send-btn">Send</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { doc, getDoc, collection, query, where, getDocs, addDoc, onSnapshot, orderBy, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        let currentUserId = null;
        let currentUserData = null;
        let activeChatUserId = null;
        let unsubscribeChat = null;

        // Switch Tabs
        window.switchTab = function(tabId, btnElement) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUserId = user.uid;
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    currentUserData = userDoc.data();
                    renderProfileTab();
                    loadMatches(currentUserData.lookingFor);
                    loadPosts();
                } else {
                    window.location.href = 'profile-setup.html';
                }
            } else {
                window.location.href = 'index.html';
            }
        });

        // Profile Tab Render
        function renderProfileTab() {
            document.getElementById('my-name').innerText = currentUserData.fullName;
            document.getElementById('my-sdnp-id').innerText = currentUserData.sdnpId || "SDNP-User";
            document.getElementById('my-location').innerText = `📍 ${currentUserData.city}, ${currentUserData.country}`;
            document.getElementById('my-bio').innerText = `"${currentUserData.bio}"`;
            document.getElementById('my-photo').src = currentUserData.photoUrl || 'https://via.placeholder.com/120';
            if(currentUserData.coverUrl) document.getElementById('my-cover').src = currentUserData.coverUrl;

            const invToggle = document.getElementById('invisible-toggle');
            invToggle.checked = currentUserData.invisibleMode || false;
            invToggle.addEventListener('change', async (e) => {
                await updateDoc(doc(db, "users", currentUserId), { invisibleMode: e.target.checked });
            });
        }

        // LOAD MATCHES
        async function loadMatches(lookingFor) {
            const matchesGrid = document.getElementById('matches-grid');
            matchesGrid.innerHTML = "";
            const q = query(collection(db, "users"), where("gender", "==", lookingFor));
            const snapshot = await getDocs(q);

            snapshot.forEach((docSnap) => {
                if (docSnap.id !== currentUserId) {
                    const profile = docSnap.data();
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${profile.photoUrl || 'https://via.placeholder.com/100'}" alt="User">
                        <h4>${profile.fullName}, ${profile.age}</h4>
                        <p class="card-id">${profile.sdnpId || 'SDNP'}</p>
                        <p style="font-size:0.8rem; color:#aaa;">📍 ${profile.city}, ${profile.country}</p>
                        <button class="msg-btn" onclick="openChatBox('${docSnap.id}', '${profile.fullName}')">
                            Chat 💬 <span class="unread-badge" id="unread-${docSnap.id}" style="display:none;">0</span>
                        </button>
                    `;
                    matchesGrid.appendChild(card);
                    listenUnreadBadge(docSnap.id);
                }
            });
        }

        // SDNP ID Search
        document.getElementById('search-btn').addEventListener('click', async () => {
            const queryId = document.getElementById('search-id-input').value.trim();
            if(!queryId) return;
            const matchesGrid = document.getElementById('matches-grid');
            matchesGrid.innerHTML = "<p>Searching...</p>";

            const q = query(collection(db, "users"), where("sdnpId", "==", queryId));
            const snapshot = await getDocs(q);
            matchesGrid.innerHTML = "";

            if(snapshot.empty) {
                matchesGrid.innerHTML = "<p style='color:#aaa;'>No user found with this SDNP ID!</p>";
                return;
            }

            snapshot.forEach((docSnap) => {
                const profile = docSnap.data();
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${profile.photoUrl}" alt="User">
                    <h4>${profile.fullName}, ${profile.age}</h4>
                    <p class="card-id">${profile.sdnpId}</p>
                    <button class="msg-btn" onclick="openChatBox('${docSnap.id}', '${profile.fullName}')">Chat 💬</button>
                `;
                matchesGrid.appendChild(card);
            });
        });

        // CHAT SYSTEM
        function getChatId(uid1, uid2) { return uid1 < uid2 ? `${uid1}_${uid2}` : `${uid2}_${uid1}`; }

        window.openChatBox = function(receiverUid, receiverName) {
            activeChatUserId = receiverUid;
            document.getElementById('chat-user-name').innerText = receiverName;
            document.getElementById('chat-modal').style.display = 'flex';
            const chatId = getChatId(currentUserId, receiverUid);

            const q = query(collection(db, "chats", chatId, "messages"), orderBy("createdAt", "asc"));
            if (unsubscribeChat) unsubscribeChat();

            unsubscribeChat = onSnapshot(q, (snapshot) => {
                const chatMessages = document.getElementById('chat-messages');
                chatMessages.innerHTML = '';
                snapshot.forEach(async (docSnap) => {
                    const msg = docSnap.data();
                    if (msg.receiverId === currentUserId && !msg.read) {
                        await updateDoc(doc(db, "chats", chatId, "messages", docSnap.id), { read: true });
                    }
                    const msgDiv = document.createElement('div');
                    const isSticker = ['🔥','💋','😈','🥂','🌶️','🔞','🌹','🙈'].includes(msg.text);
                    msgDiv.className = `message ${msg.senderId === currentUserId ? 'sent' : 'received'} ${isSticker ? 'sticker-msg' : ''}`;
                    msgDiv.innerText = msg.text;
                    chatMessages.appendChild(msgDiv);
                });
                chatMessages.scrollTop = chatMessages.scrollHeight;
            });
        };

        window.sendSticker = async function(emoji) {
            if(!activeChatUserId) return;
            const chatId = getChatId(currentUserId, activeChatUserId);
            await addDoc(collection(db, "chats", chatId, "messages"), {
                text: emoji, senderId: currentUserId, receiverId: activeChatUserId, read: false, createdAt: new Date()
            });
        };

        document.getElementById('send-btn').addEventListener('click', async () => {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text || !activeChatUserId) return;
            input.value = '';
            const chatId = getChatId(currentUserId, activeChatUserId);
            await addDoc(collection(db, "chats", chatId, "messages"), {
                text: text, senderId: currentUserId, receiverId: activeChatUserId, read: false, createdAt: new Date()
            });
        });

        function listenUnreadBadge(otherUid) {
            const chatId = getChatId(currentUserId, otherUid);
            const q = query(collection(db, "chats", chatId, "messages"), where("receiverId", "==", currentUserId), where("read", "==", false));
            onSnapshot(q, (snap) => {
                const badge = document.getElementById(`unread-${otherUid}`);
                if(badge) {
                    if(snap.size > 0) { badge.innerText = snap.size; badge.style.display = 'flex'; }
                    else { badge.style.display = 'none'; }
                }
            });
        }

        // CREATE POST & FEED
        document.getElementById('publish-post-btn').addEventListener('click', async () => {
            const text = document.getElementById('post-text').value.trim();
            const photo = document.getElementById('post-photo').value.trim();
            if(!text && !photo) return;

            await addDoc(collection(db, "posts"), {
                userId: currentUserId, userName: currentUserData.fullName, userPhoto: currentUserData.photoUrl,
                sdnpId: currentUserData.sdnpId, text: text, photoUrl: photo, likes: [], createdAt: new Date()
            });
            document.getElementById('post-text').value = '';
            document.getElementById('post-photo').value = '';
            loadPosts();
        });

        async function loadPosts() {
            const container = document.getElementById('feed-posts-container');
            container.innerHTML = "";
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
            const snapshot = await getDocs(q);

            let count = 0;
            snapshot.forEach((docSnap) => {
                const p = docSnap.data();
                count++;
                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    <div class="post-header">
                        <img src="${p.userPhoto || 'https://via.placeholder.com/45'}" alt="User">
                        <div>
                            <h4>${p.userName}</h4>
                            <span style="font-size:0.75rem; color:#ff3366;">${p.sdnpId || 'SDNP'}</span>
                        </div>
                    </div>
                    <p>${p.text}</p>
                    ${p.photoUrl ? `<img src="${p.photoUrl}" style="width:100%; border-radius:12px; margin-top:10px;">` : ''}
                `;
                container.appendChild(card);

                // Insert In-Feed Ad Placeholder every 3 posts
                if (count % 3 === 0) {
                    const adCard = document.createElement('div');
                    adCard.className = 'post-card';
                    adCard.style.textAlign = 'center';
                    adCard.style.color = '#777';
                    adCard.innerHTML = `📢 <b>Sponsored Advertisement Space</b>`;
                    container.appendChild(adCard);
                }
            });
        }

        document.getElementById('close-chat-btn').addEventListener('click', () => {
            document.getElementById('chat-modal').style.display = 'none';
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = 'index.html');
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Secret Date Nepal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: #0f1015; 
            color: #ffffff; 
            min-height: 100vh; 
            padding-bottom: 80px; 
        }

        /* FACEBOOK STYLE TOP NAVBAR */
        .fb-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #181920;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 8px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .fb-left { display: flex; align-items: center; gap: 12px; }
        .fb-logo { 
            font-weight: 800; 
            font-size: 1.3rem; 
            background: linear-gradient(45deg, #ff3366, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .fb-search {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 6px 14px;
            gap: 8px;
            width: 220px;
        }
        .fb-search i { color: #aaa; font-size: 0.85rem; }
        .fb-search input {
            background: transparent; border: none; outline: none;
            color: #fff; font-size: 0.85rem; width: 100%;
        }

        .fb-center { display: flex; gap: 10px; }
        .nav-icon-btn {
            width: 50px; height: 42px;
            display: flex; justify-content: center; align-items: center;
            color: #aaa; font-size: 1.2rem; cursor: pointer; border-radius: 10px;
            transition: 0.2s; position: relative;
        }
        .nav-icon-btn:hover, .nav-icon-btn.active {
            color: #ff3366; background: rgba(255, 51, 102, 0.1);
        }
        .nav-icon-btn.active::after {
            content: ''; position: absolute; bottom: -8px; left: 0; width: 100%; height: 3px; background: #ff3366; border-radius: 3px;
        }

        .fb-right { display: flex; align-items: center; gap: 10px; }
        .circle-icon-btn {
            width: 38px; height: 38px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.1); display: flex;
            justify-content: center; align-items: center; color: #fff;
            font-size: 1rem; cursor: pointer; position: relative; transition: 0.2s;
        }
        .circle-icon-btn:hover { background: rgba(255, 51, 102, 0.3); }
        .badge {
            position: absolute; top: -3px; right: -3px; background: #ff0055;
            color: white; font-size: 0.7rem; font-weight: bold; width: 18px;
            height: 18px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
        }

        .header-avatar {
            width: 38px; height: 38px; border-radius: 50%;
            object-fit: cover; border: 2px solid #ff3366; cursor: pointer;
        }

        .container { max-width: 680px; margin: 20px auto; padding: 0 15px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* FACEBOOK STYLE CREATE POST CARD */
        .fb-post-creator {
            background: #181920;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .creator-top {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .creator-avatar {
            width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 1px solid #ff3366;
        }

        .creator-input-trigger {
            flex: 1;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 25px;
            padding: 10px 18px;
            color: #aaa;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .creator-input-trigger:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }

        .creator-options {
            display: flex;
            justify-content: space-around;
            padding-top: 10px;
        }

        .opt-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ccc;
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            padding: 8px 14px;
            border-radius: 10px;
            transition: 0.2s;
        }
        .opt-btn:hover { background: rgba(255, 255, 255, 0.06); }

        /* POST MODAL POPUP */
        .post-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            justify-content: center; align-items: center; z-index: 1000;
        }
        .post-modal-box {
            background: #181920; border: 1px solid rgba(255, 51, 102, 0.3);
            width: 500px; max-width: 90%; border-radius: 20px; padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08); padding-bottom: 12px; margin-bottom: 15px;
        }
        .modal-header h3 { font-size: 1.1rem; color: #fff; }
        .close-modal { cursor: pointer; font-size: 1.3rem; color: #aaa; }

        /* POST CARD */
        .post-card {
            background: #181920;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px; padding: 18px; margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .post-header img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid #ff3366; }
        .post-header h4 { font-size: 0.95rem; color: #fff; }
        .post-header span { font-size: 0.75rem; color: #ff3366; font-weight: 600; }
        .post-text { font-size: 0.92rem; color: #e0e0e0; line-height: 1.5; margin-bottom: 10px; }
        .post-card img.post-img { width: 100%; max-height: 400px; object-fit: cover; border-radius: 12px; margin-top: 10px; }

        /* MATCHES GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .card {
            background: #181920; border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px; padding: 15px; text-align: center; transition: 0.3s;
        }
        .card:hover { transform: translateY(-4px); border-color: #ff3366; }
        .card img { width: 85px; height: 85px; border-radius: 50%; object-fit: cover; border: 2px solid #ff3366; margin-bottom: 8px; }
        .card-id { font-size: 0.78rem; color: #ff3366; font-weight: 600; }
        .msg-btn {
            width: 100%; background: rgba(255, 51, 102, 0.15); border: 1px solid rgba(255, 51, 102, 0.3);
            color: white; padding: 8px; border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: 10px; font-size: 0.85rem;
        }

        /* PROFILE CARD */
        .profile-card { background: #181920; border: 1px solid rgba(255, 51, 102, 0.2); border-radius: 16px; overflow: hidden; text-align: center; padding-bottom: 20px; margin-bottom: 20px; }
        .cover-img { width: 100%; height: 160px; object-fit: cover; }
        .profile-img { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 4px solid #ff3366; margin-top: -55px; }
    </style>
</head>
<body>

    <!-- FACEBOOK STYLE HEADER NAVBAR -->
    <header class="fb-header">
        <div class="fb-left">
            <div class="fb-logo" onclick="switchTab('feed-tab', document.getElementById('nav-feed'))">SDN 💖</div>
            <div class="fb-search">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="header-search" placeholder="Search SDNP User...">
            </div>
        </div>

        <div class="fb-center">
            <div class="nav-icon-btn active" id="nav-feed" onclick="switchTab('feed-tab', this)" title="Feed">
                <i class="fa-solid fa-house"></i>
            </div>
            <div class="nav-icon-btn" id="nav-matches" onclick="switchTab('matches-tab', this)" title="Matches">
                <i class="fa-solid fa-heart"></i>
            </div>
            <div class="nav-icon-btn" id="nav-profile" onclick="switchTab('profile-tab', this)" title="Profile">
                <i class="fa-solid fa-user"></i>
            </div>
        </div>

        <div class="fb-right">
            <div class="circle-icon-btn" title="Messages" onclick="switchTab('matches-tab', document.getElementById('nav-matches'))">
                <i class="fa-solid fa-comment"></i>
            </div>
            <div class="circle-icon-btn" title="Notifications">
                <i class="fa-solid fa-bell"></i>
                <span class="badge">2</span>
            </div>
            <img id="nav-user-avatar" class="header-avatar" src="https://via.placeholder.com/40" onclick="switchTab('profile-tab', document.getElementById('nav-profile'))" alt="Avatar">
            <div class="circle-icon-btn" id="logout-btn" title="Logout" style="background: rgba(255, 0, 85, 0.2); color: #ff3366;">
                <i class="fa-solid fa-right-from-bracket"></i>
            </div>
        </div>
    </header>

    <div class="container">

        <!-- 1. FEED TAB -->
        <div id="feed-tab" class="tab-content active">
            
            <!-- FACEBOOK STYLE WHAT'S ON YOUR MIND CARD -->
            <div class="fb-post-creator">
                <div class="creator-top">
                    <img id="creator-avatar" class="creator-avatar" src="https://via.placeholder.com/40" alt="Avatar">
                    <div class="creator-input-trigger" onclick="openPostModal()">What's on your secret mind?</div>
                </div>
                <div class="creator-options">
                    <div class="opt-btn" style="color: #f3425f;" onclick="openPostModal()">
                        <i class="fa-solid fa-video" style="font-size: 1.1rem;"></i> Live video
                    </div>
                    <div class="opt-btn" style="color: #45bd62;" onclick="openPostModal()">
                        <i class="fa-solid fa-images" style="font-size: 1.1rem;"></i> Photo/video
                    </div>
                    <div class="opt-btn" style="color: #f7b928;" onclick="openPostModal()">
                        <i class="fa-solid fa-clapperboard" style="font-size: 1.1rem;"></i> Reel
                    </div>
                </div>
            </div>

            <div id="feed-posts-container">
                <!-- Posts -->
            </div>
        </div>

        <!-- 2. MATCHES TAB -->
        <div id="matches-tab" class="tab-content">
            <h3 style="margin-bottom: 15px; color: #ff3366;">💕 Suggested Secret Matches</h3>
            <div class="grid" id="matches-grid">
                <!-- Matches -->
            </div>
        </div>

        <!-- 3. PROFILE TAB -->
        <div id="profile-tab" class="tab-content">
            <div class="profile-card">
                <img id="my-cover" class="cover-img" src="https://images.unsplash.com/photo-1518709268805-4e9042af9f23" alt="Cover">
                <img id="my-photo" class="profile-img" src="https://via.placeholder.com/120" alt="Profile">
                <h3 id="my-name" style="margin-top: 10px;">Loading...</h3>
                <p id="my-sdnp-id" class="card-id">SDNP-ID</p>
                <p id="my-location" style="font-size:0.85rem; color:#ccc; margin-top:4px;">📍 Nepal</p>
                <p id="my-bio" style="margin: 15px 0; color:#aaa;">"No bio yet."</p>
            </div>

            <h3 style="color:#ff3366; margin-bottom: 15px; font-size:1.1rem;">📸 My Published Posts</h3>
            <div id="my-posts-container">
                <!-- User Posts -->
            </div>
        </div>

    </div>

    <!-- POST CREATOR POPUP MODAL -->
    <div id="post-modal" class="post-modal">
        <div class="post-modal-box">
            <div class="modal-header">
                <h3>Create Post 📝</h3>
                <span class="close-modal" onclick="closePostModal()">&times;</span>
            </div>
            <textarea id="post-text" rows="4" style="width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:12px; color:#fff; outline:none; resize:none;" placeholder="Share your romantic thoughts..."></textarea>
            
            <div style="margin: 15px 0;">
                <label style="background:rgba(255,255,255,0.08); padding:8px 15px; border-radius:10px; cursor:pointer; font-size:0.85rem; border:1px solid rgba(255,255,255,0.15);">
                    📷 Choose Photo
                    <input type="file" id="post-photo-upload" accept="image/*" style="display:none;">
                </label>
                <span id="file-name-display" style="font-size:0.8rem; color:#ff3366; margin-left:10px;"></span>
            </div>

            <button id="publish-post-btn" style="width:100%; background:linear-gradient(45deg, #ff3366, #ff0055); border:none; color:white; padding:10px; border-radius:12px; font-weight:bold; cursor:pointer;">Publish Post 🚀</button>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { doc, getDoc, collection, query, where, getDocs, addDoc, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        let currentUserId = null;
        let currentUserData = null;

        window.switchTab = function(tabId, btnElement) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-icon-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(btnElement) btnElement.classList.add('active');
        }

        window.openPostModal = function() { document.getElementById('post-modal').style.display = 'flex'; }
        window.closePostModal = function() { document.getElementById('post-modal').style.display = 'none'; }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUserId = user.uid;
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    currentUserData = userDoc.data();
                    renderHeaderAndProfile();
                    loadMyPosts();
                    loadMatches(currentUserData.lookingFor);
                    loadPosts();
                } else {
                    window.location.href = 'profile-setup.html';
                }
            } else {
                window.location.href = 'index.html';
            }
        });

        function renderHeaderAndProfile() {
            const photo = currentUserData.photoUrl || 'https://via.placeholder.com/120';
            document.getElementById('nav-user-avatar').src = photo;
            document.getElementById('creator-avatar').src = photo;
            document.getElementById('my-photo').src = photo;

            document.getElementById('my-name').innerText = currentUserData.fullName || currentUserData.firstName || 'User';
            document.getElementById('my-sdnp-id').innerText = currentUserData.sdnpId || "SDNP-User";
            document.getElementById('my-location').innerText = `📍 ${currentUserData.city || 'City'}, ${currentUserData.country || 'Nepal'}`;
            document.getElementById('my-bio').innerText = `"${currentUserData.bio || 'No bio'}"`;
            if(currentUserData.coverUrl) document.getElementById('my-cover').src = currentUserData.coverUrl;
        }

        document.getElementById('post-photo-upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(file) document.getElementById('file-name-display').innerText = `Selected: ${file.name}`;
        });

        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height, maxDim = 500;
                        if (width > height && width > maxDim) { height *= maxDim / width; width = maxDim; }
                        else if (height > maxDim) { width *= maxDim / height; height = maxDim; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                };
            });
        }

        // PUBLISH POST
        document.getElementById('publish-post-btn').addEventListener('click', async () => {
            const text = document.getElementById('post-text').value.trim();
            const photoFile = document.getElementById('post-photo-upload').files[0];
            
            if(!text && !photoFile) return alert("Write something or add a photo!");

            const btn = document.getElementById('publish-post-btn');
            btn.disabled = true; btn.innerText = "Publishing...";

            try {
                let photoUrl = photoFile ? await compressImage(photoFile) : "";
                await addDoc(collection(db, "posts"), {
                    userId: currentUserId,
                    userName: currentUserData.fullName || currentUserData.firstName || 'User',
                    userPhoto: currentUserData.photoUrl || '',
                    sdnpId: currentUserData.sdnpId || 'SDNP',
                    text: text, photoUrl: photoUrl, createdAt: new Date()
                });

                document.getElementById('post-text').value = '';
                document.getElementById('post-photo-upload').value = '';
                document.getElementById('file-name-display').innerText = '';
                closePostModal();
            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                btn.disabled = false; btn.innerText = "Publish Post 🚀";
            }
        });

        // GLOBAL FEED POSTS
        function loadPosts() {
            const container = document.getElementById('feed-posts-container');
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
            
            onSnapshot(q, (snapshot) => {
                container.innerHTML = "";
                snapshot.forEach((docSnap) => {
                    const p = docSnap.data();
                    const card = document.createElement('div');
                    card.className = 'post-card';
                    card.innerHTML = `
                        <div class="post-header">
                            <img src="${p.userPhoto || 'https://via.placeholder.com/44'}" alt="User">
                            <div>
                                <h4>${p.userName}</h4>
                                <span>${p.sdnpId || 'SDNP'}</span>
                            </div>
                        </div>
                        ${p.text ? `<p class="post-text">${p.text}</p>` : ''}
                        ${p.photoUrl ? `<img src="${p.photoUrl}" class="post-img">` : ''}
                    `;
                    container.appendChild(card);
                });
            });
        }

        // USER MY POSTS
        function loadMyPosts() {
            const container = document.getElementById('my-posts-container');
            const q = query(collection(db, "posts"), where("userId", "==", currentUserId));
            
            onSnapshot(q, (snapshot) => {
                container.innerHTML = "";
                if(snapshot.empty) return container.innerHTML = "<p style='color:#aaa;'>No posts yet.</p>";

                let postsArray = [];
                snapshot.forEach((docSnap) => postsArray.push(docSnap.data()));
                postsArray.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

                postsArray.forEach((p) => {
                    const card = document.createElement('div');
                    card.className = 'post-card';
                    card.innerHTML = `
                        <div class="post-header">
                            <img src="${p.userPhoto || 'https://via.placeholder.com/44'}" alt="User">
                            <div>
                                <h4>${p.userName}</h4>
                                <span>${p.sdnpId || 'SDNP'}</span>
                            </div>
                        </div>
                        ${p.text ? `<p class="post-text">${p.text}</p>` : ''}
                        ${p.photoUrl ? `<img src="${p.photoUrl}" class="post-img">` : ''}
                    `;
                    container.appendChild(card);
                });
            });
        }

        // MATCHES
        async function loadMatches(lookingFor) {
            const matchesGrid = document.getElementById('matches-grid');
            matchesGrid.innerHTML = "";
            const q = query(collection(db, "users"), where("gender", "==", lookingFor));
            const snapshot = await getDocs(q);

            snapshot.forEach((docSnap) => {
                if (docSnap.id !== currentUserId) {
                    const profile = docSnap.data();
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${profile.photoUrl || 'https://via.placeholder.com/85'}" alt="User">
                        <h4>${profile.fullName || profile.firstName}, ${profile.age || ''}</h4>
                        <p class="card-id">${profile.sdnpId || 'SDNP'}</p>
                        <button class="msg-btn">Chat 💬</button>
                    `;
                    matchesGrid.appendChild(card);
                }
            });
        }

        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = 'index.html');
        });
    </script>
</body>
</html>

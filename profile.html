<!-- profile.html -->
<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Date Nepal - Setup Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <h2>तपाईंको प्रोफाइल 👤</h2>
        <form id="profile-form">
            <input type="text" id="full-name" placeholder="पूरा नाम" required>
            <input type="number" id="age" placeholder="उमेर (१८ वर्ष पुगेको हुनुपर्ने)" min="18" required>
            
            <select id="gender" style="width: 95%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px;" required>
                <option value="">लिङ्ग छान्नुहोस्</option>
                <option value="Male">पुरुष</option>
                <option value="Female">महिला</option>
                <option value="Other">अन्य</option>
            </select>

            <input type="text" id="district" placeholder="जिल्ला (जस्तै: काठमाडौँ)" required>
            
            <button type="submit">प्रोफाइल सेभ गर्नुहोस्</button>
        </form>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const profileForm = document.getElementById('profile-form');
        let currentUser = null;

        // लगइन भएको युजर चेक गर्ने
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
            } else {
                alert("कृपया पहिले लगइन गर्नुहोस्!");
                window.location.href = 'index.html';
            }
        });

        // डेटाबेसमा प्रोफाइल सेभ गर्ने Logic
        profileForm.addEventListener('submit', (e) => {
            e.preventDefault();

            if (!currentUser) return;

            const fullName = document.getElementById('full-name').value;
            const age = document.getElementById('age').value;
            const gender = document.getElementById('gender').value;
            const district = document.getElementById('district').value;

            // Firestore Database को 'users' collection मा डेटा राख्ने
            setDoc(doc(db, "users", currentUser.uid), {
                name: fullName,
                age: parseInt(age),
                gender: gender,
                district: district,
                email: currentUser.email,
                uid: currentUser.uid
            })
            .then(() => {
                alert("प्रोफाइल सफलतापूर्वक सेभ भयो!");
                // पछि यहाँबाट हामी Facebook जस्तो Feed पेजमा लैजानेछौँ
            })
            .catch((error) => {
                alert("डेटा सेभ गर्न सकिएन: " + error.message);
            });
        });
    </script>
</body>
</html>

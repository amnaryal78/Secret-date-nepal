<!-- profile.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Date Nepal - Setup Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <h2>Setup Your Profile 👤</h2>
        <form id="profile-form">
            <input type="text" id="username" placeholder="Choose Username (Unique)" required>
            <input type="text" id="full-name" placeholder="Full Name" required>
            <input type="number" id="age" placeholder="Age (Must be 18+)" min="18" required>
            
            <select id="gender" style="width: 95%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px;" required>
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>

            <input type="text" id="district" placeholder="District (e.g. Kathmandu)" required>
            
            <button type="submit">Save Profile</button>
        </form>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { doc, setDoc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const profileForm = document.getElementById('profile-form');
        let currentUser = null;

        // Check if user is logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
            } else {
                alert("Please login first!");
                window.location.href = 'index.html';
            }
        });

        // Save Profile Logic with Username Check
        profileForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!currentUser) return;

            const username = document.getElementById('username').value.trim().toLowerCase();
            const fullName = document.getElementById('full-name').value;
            const age = document.getElementById('age').value;
            const gender = document.getElementById('gender').value;
            const district = document.getElementById('district').value;

            // १. युजरनेम पहिले नै कसैले लिएको छ कि छैन (Unique Username Check) गर्ने लजिक
            const usersRef = collection(db, "users");
            const q = query(usersRef, where("username", "==", username));
            const querySnapshot = await getDocs(q);

            if (!querySnapshot.empty) {
                alert("This username is already taken! Please choose another one.");
                return;
            }

            // २. डेटाबेसमा डेटा सेभ गर्ने
            setDoc(doc(db, "users", currentUser.uid), {
                username: username,
                name: fullName,
                age: parseInt(age),
                gender: gender,
                district: district,
                email: currentUser.email,
                uid: currentUser.uid
            })
            .then(() => {
                alert("Profile successfully saved!");
            })
            .catch((error) => {
                alert("Error saving profile: " + error.message);
            });
        });
    </script>
</body>
</html>

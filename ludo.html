<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Couple Ludo - Romantic Dating Game</title>
    <style>
        :root {
            --red: #ff4757;
            --yellow: #ffa502;
            --blue: #1e90ff;
            --pink: #ff6b81;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .header-title {
            color: #d63031;
            margin-bottom: 10px;
            text-align: center;
        }

        .game-container {
            position: relative;
            background: #fff;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 500px;
            width: 100%;
        }

        .status-bar {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            background: #ffeaa7;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            color: #2d3436;
            margin-bottom: 15px;
        }

        .ludo-board {
            width: 420px;
            height: 420px;
            display: grid;
            grid-template-columns: 180px 60px 180px;
            grid-template-rows: 180px 60px 180px;
            border: 4px solid #2d3436;
            border-radius: 12px;
            background: #fff;
            position: relative;
        }

        .zone {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #2d3436;
        }

        .zone.red-home { background: var(--red); grid-column: 1; grid-row: 1; }
        .zone.yellow-home { background: var(--yellow); grid-column: 3; grid-row: 3; }
        .zone.blue-home { background: var(--blue); grid-column: 1; grid-row: 3; }
        .zone.pink-home { background: var(--pink); grid-column: 3; grid-row: 1; }

        .inner-box {
            width: 120px;
            height: 120px;
            background: #ffffff;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .avatar { font-size: 2.8rem; cursor: pointer; }
        .avatar-label { font-size: 0.75rem; font-weight: bold; margin-top: 4px; text-align: center; }

        .bubble {
            position: absolute;
            top: -35px;
            background: #fff;
            border: 2px solid #2d3436;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            display: none;
            z-index: 20;
            white-space: nowrap;
        }

        .center-home {
            grid-column: 2; grid-row: 2;
            background: linear-gradient(45deg, var(--red), var(--yellow), var(--pink), var(--blue));
            display: flex; align-items: center; justify-content: center;
        }

        .center-home::after { content: "❤️"; font-size: 1.8rem; }

        .token {
            width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; cursor: pointer;
            border: 2px solid #fff; position: absolute;
            transition: all 0.4s ease; z-index: 10;
        }

        .token.red-token { background: var(--red); }
        .token.yellow-token { background: var(--yellow); }

        .controls {
            margin-top: 20px;
            display: flex; align-items: center; justify-content: space-around; width: 100%;
        }

        .dice-container {
            perspective: 600px; width: 60px; height: 60px;
            transition: transform 0.5s ease;
        }

        .dice {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d; transition: transform 0.8s ease-out;
        }

        .dice-face {
            width: 60px; height: 60px; background: #fff;
            border: 2px solid #2d3436; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; font-weight: bold; color: #d63031;
        }

        .roll-btn {
            padding: 10px 24px; font-size: 1rem; font-weight: bold;
            color: #fff; background: #6c5ce7; border: none;
            border-radius: 25px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.4);
        }

        .finale-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.88); display: none;
            flex-direction: column; align-items: center; justify-content: center;
            border-radius: 20px; z-index: 100; color: #fff; text-align: center; padding: 20px;
        }

        .finale-couple { font-size: 5rem; margin: 15px 0; animation: pulse 1.5s infinite alternate; }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }

        .restart-btn {
            margin-top: 15px; padding: 8px 20px; background: #ff4757;
            color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <h2 class="header-title">💕 Nepali Date Ludo 💕</h2>

    <div class="game-container">
        <div class="status-bar" id="status">केटाको पालो (Red 🕺) - पासा घुमाउनुहोस्!</div>

        <div class="ludo-board">
            <div class="zone red-home">
                <div class="inner-box">
                    <div class="avatar">🕺</div>
                    <div class="avatar-label">केटा (Red)</div>
                </div>
            </div>

            <div class="zone pink-home">
                <div class="inner-box">
                    <div class="bubble" id="pink-bubble">जिस्काइदिऊँ? 😉</div>
                    <div class="avatar">👩‍💼</div>
                    <div class="avatar-label">नेपाली सुन्दरी (Pink)</div>
                </div>
            </div>

            <div class="zone blue-home">
                <div class="inner-box">
                    <div class="bubble" id="blue-bubble">उफ्! 😡</div>
                    <div class="avatar">👨‍💼</div>
                    <div class="avatar-label">नेपाली युवा (Blue)</div>
                </div>
            </div>

            <div class="zone yellow-home">
                <div class="inner-box">
                    <div class="avatar">💃</div>
                    <div class="avatar-label">केटी (Yellow)</div>
                </div>
            </div>

            <div class="center-home"></div>

            <div class="token red-token" id="red-token" style="top: 75px; left: 75px;">🕺</div>
            <div class="token yellow-token" id="yellow-token" style="bottom: 75px; right: 75px;">💃</div>
        </div>

        <div class="controls">
            <button class="roll-btn" onclick="rollDice()">पासा घुमाउनुहोस् 🎲</button>
            <div class="dice-container" id="dice-container">
                <div class="dice" id="dice">
                    <div class="dice-face" id="dice-val">1</div>
                </div>
            </div>
        </div>

        <div class="finale-overlay" id="finale">
            <h2>🎉 बधाई छ! प्रेमको विजय भयो! 💕</h2>
            <div class="finale-couple">👩‍❤️‍💋‍👨</div>
            <p id="winner-text"></p>
            <button class="restart-btn" onclick="resetGame()">फेरि खेल्नुहोस् 🔄</button>
        </div>
    </div>

    <script>
        let turn = 'red';
        let redPos = 0;
        let yellowPos = 0;
        let isRolling = false;

        const statusEl = document.getElementById('status');
        const diceEl = document.getElementById('dice');
        const diceValEl = document.getElementById('dice-val');
        const pinkBubble = document.getElementById('pink-bubble');
        const blueBubble = document.getElementById('blue-bubble');
        const finaleEl = document.getElementById('finale');
        const winnerText = document.getElementById('winner-text');

        function showBubble(element, text) {
            element.innerText = text;
            element.style.display = 'block';
            setTimeout(() => { element.style.display = 'none'; }, 2500);
        }

        function rollDice() {
            if (isRolling) return;
            isRolling = true;

            const diceContainer = document.getElementById('dice-container');
            if(turn === 'red') {
                diceContainer.style.transform = 'translateX(-100px)';
            } else {
                diceContainer.style.transform = 'translateX(100px)';
            }

            let rolls = 0;
            let interval = setInterval(() => {
                let randomVal = Math.floor(Math.random() * 6) + 1;
                diceValEl.innerText = randomVal;
                diceEl.style.transform = `rotateX(${rolls * 90}deg) rotateY(${rolls * 90}deg)`;
                rolls++;
                if (rolls > 10) {
                    clearInterval(interval);
                    let finalVal = Math.floor(Math.random() * 6) + 1;
                    diceValEl.innerText = finalVal;
                    isRolling = false;
                    handleTurn(finalVal);
                }
            }, 70);
        }

        function handleTurn(diceValue) {
            if (turn === 'red') {
                if (diceValue === 6) {
                    showBubble(blueBubble, "केटाको ६ आयो! 🔥");
                    showBubble(pinkBubble, "वाह कान्छा! 😉");
                }
                redPos += diceValue;
                document.getElementById('red-token').style.transform = `translate(${redPos * 12}px, ${redPos * 8}px)`;

                if (redPos >= 20) {
                    triggerFinale("केटा (Red 🕺)");
                    return;
                }
                turn = 'yellow';
                statusEl.innerText = "केटीको पालो (Yellow 💃) - पासा घुमाउनुहोस्!";
            } else {
                if (diceValue === 6) {
                    showBubble(pinkBubble, "६ आयो! नीलो बक्सको केटालाई जिस्काएँ 😜");
                    showBubble(blueBubble, "उफ्, मलाई जिस्काउने? 😡");
                }
                yellowPos += diceValue;
                document.getElementById('yellow-token').style.transform = `translate(-${yellowPos * 12}px, -${yellowPos * 8}px)`;

                if (yellowPos >= 20) {
                    triggerFinale("केटी (Yellow 💃)");
                    return;
                }
                turn = 'red';
                statusEl.innerText = "केटाको पालो (Red 🕺) - पासा घुमाउनुहोस्!";
            }
        }

        function triggerFinale(winner) {
            winnerText.innerText = `${winner} ले गेम जिते पनि, नीलो र पिंक बक्सका प्रेमीहरूले बीचमा आएर मीठो Hug र Kiss गरेर गेम समाप्त भयो! ❤️`;
            finaleEl.style.display = 'flex';
        }

        function resetGame() {
            redPos = 0; yellowPos = 0; turn = 'red';
            document.getElementById('red-token').style.transform = 'none';
            document.getElementById('yellow-token').style.transform = 'none';
            finaleEl.style.display = 'none';
            statusEl.innerText = "केटाको पालो (Red 🕺) - पासा घुमाउनुहोस्!";
        }
    </script>
</body>
</html>
